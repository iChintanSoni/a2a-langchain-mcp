apiVersion: v1
kind: Service
metadata:
  name: a2a-server
  namespace: a2a-system
spec:
  selector:
    app: a2a-server
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30001
    - name: grpc
      port: 4001
      targetPort: 4001
      nodePort: 30002
  type: NodePort
