apiVersion: v1
kind: ConfigMap
metadata:
  name: a2a-server-config
  namespace: a2a-system
data:
  HOST: "0.0.0.0"
  PORT: "4000"
  GRPC_PORT: "4001"
  # CARD_HOST is the externally-reachable address advertised in the agent card.
  # For a kind cluster with extraPortMappings this is the host loopback.
  # Change to your node IP or LoadBalancer hostname for non-local deployments.
  CARD_HOST: "127.0.0.1"
  MCP_SERVER_HOST: "mcp-server"
  MCP_SERVER_PORT: "5050"
  REDIS_URL: "redis://redis:6379"
  # Ollama runs on the host machine.
  # host.containers.internal resolves to the Podman host gateway on macOS/Linux.
  OLLAMA_BASE_URL: "http://host.containers.internal:11434"
  OLLAMA_MODEL: "qwen3:4b"
