apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-config
  namespace: a2a-system
data:
  HOST: "0.0.0.0"
  PORT: "5050"
  # Ollama image generation runs from the host machine.
  # host.containers.internal resolves to the Podman host gateway on macOS/Linux.
  OLLAMA_HOST: "http://host.containers.internal:11434"
  OLLAMA_IMAGE_MODEL: "x/flux2-klein:4b"
